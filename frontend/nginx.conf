server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # index.html : jamais cacher — évite que le navigateur serve un vieux HTML
    # pointant vers des bundles hashés qui n'existent plus après redeploy.
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        expires off;
    }

    # Cache des assets hashés (index-<hash>.js/css) : immutable 1 an.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
