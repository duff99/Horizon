# Security headers communs — factorisés pour être inclus dans chaque `location`
# qui définit ses propres `add_header` (sinon nginx hérite de rien dès qu'un
# location a son propre `add_header`). Cf. docs nginx http_headers_module.
#
# `always` garantit l'envoi même sur 4xx/5xx.
#
# NB : cette conf tourne dans le container `horizon-frontend-1` (nginx:alpine).
# Le TLS est géré par le nginx hôte qui reverse-proxy sur 127.0.0.1:8100.

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # === Security headers (Plan 5d) ===
    # HSTS : 1 an, sous-domaines inclus (HTTPS fourni par nginx hôte + certbot).
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;
    # CSP en report-only d'abord : on observe les violations sans rien casser.
    # Passer en `Content-Security-Policy` (enforcement) après validation d'un cycle.
    add_header Content-Security-Policy-Report-Only "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:; connect-src 'self'; frame-ancestors 'self'" always;

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # index.html : jamais cacher — évite que le navigateur serve un vieux HTML
    # pointant vers des bundles hashés qui n'existent plus après redeploy.
    # ATTENTION : dès qu'on met un `add_header` dans un location, nginx n'hérite
    # plus des add_header du server. On re-déclare donc les security headers ici.
    location = /index.html {
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;
        add_header Content-Security-Policy-Report-Only "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:; connect-src 'self'; frame-ancestors 'self'" always;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        expires off;
    }

    # Cache des assets hashés (index-<hash>.js/css) : immutable 1 an.
    location /assets/ {
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;
        add_header Content-Security-Policy-Report-Only "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:; connect-src 'self'; frame-ancestors 'self'" always;
        expires 1y;
        add_header Cache-Control "public, immutable" always;
    }
}
